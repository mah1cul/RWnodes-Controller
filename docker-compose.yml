services:
  rwnodes-controller:
    build: .
    env_file:
      - .env
    volumes:
      - rwnodes_data:/data
      - ./ssh_keys:/ssh_keys:ro
    expose:
      - "${WEBHOOK_PORT:-8080}"
    networks:
      - caddy
    restart: unless-stopped

volumes:
  rwnodes_data:

networks:
  caddy:
    external: true
    name: ${CADDY_DOCKER_NETWORK:-caddy}
